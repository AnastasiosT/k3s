---
apiVersion: v1
kind: Namespace
metadata:
  name: web-shop
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: web-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 192.168.121.1:5000/demo-app-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          envFrom:
            # Non-sensitive config from ConfigMap
            - configMapRef:
                name: backend-config
            # Sensitive password from Secret (synced via Reflector)
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: web-shop
spec:
  selector:
    app: backend
  ports:
    - port: 5001
      targetPort: 5001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: web-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 192.168.121.1:5000/demo-app-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: BACKEND_URL
              value: "http://backend:5001"
            - name: FRONTEND_URL
              value: "http://web-shop.k3s.local"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://gateway-collector.otel-collectors.svc.cluster.local:4317"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: web-shop
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: web-shop
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: web-shop-redirect-to-https@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - web-shop.k3s.local
      secretName: wildcard-local-tls-secret
  rules:
    - host: web-shop.k3s.local
      http:
        paths:
          - path: /inventory
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5001
          - path: /process-order
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5001
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: web-shop
spec:
  redirectScheme:
    scheme: https
    permanent: true
