apiVersion: batch/v1
kind: Job
metadata:
  name: reset-stock
  namespace: web-shop
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: default
      containers:
      - name: reset
        image: postgres:16-alpine
        env:
        - name: PGPASSWORD
          value: "postgres123"
        command:
        - /bin/sh
        - -c
        - |
          psql -h postgres.postgres.svc.cluster.local -U postgres -d shop << 'EOSQL'
          UPDATE products SET stock_qty = 20;
          SELECT id, name, stock_qty FROM products LIMIT 5;
          EOSQL
      restartPolicy: Never
  ttlSecondsAfterFinished: 3600
