apiVersion: batch/v1
kind: Job
metadata:
  name: n8n-import-workflows
  namespace: n8n
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: default
      restartPolicy: Never
      containers:
        - name: importer
          image: docker.n8n.io/n8nio/n8n:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "[*] Waiting for n8n to be ready..."
              for i in $(seq 1 30); do
                if nc -z n8n 80 2>/dev/null; then
                  echo "[✓] n8n is ready"
                  break
                fi
                echo "  Attempt $i/30..."
                sleep 2
              done

              echo "[*] Importing workflows..."
              N8N_PORT=5678 n8n import:workflow --input=/workflows/example-workflow.json
              N8N_PORT=5678 n8n import:workflow --input=/workflows/monitoring-workflow.json
              N8N_PORT=5678 n8n import:workflow --input=/workflows/snipeit-to-checkmk-sync.json

              echo "[✓] All workflows imported successfully"
          env:
            - name: N8N_URL
              value: "http://n8n:80"
          volumeMounts:
            - name: n8n-workflows
              mountPath: /workflows
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
      volumes:
        - name: n8n-workflows
          configMap:
            name: n8n-workflows
