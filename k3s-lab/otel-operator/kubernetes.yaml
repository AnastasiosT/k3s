---
# Kubernetes Metrics Collector - monitors cluster metrics
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: kubernetes
  namespace: otel-collectors
spec:
  mode: deployment
  replicas: 1
  image: otel/opentelemetry-collector-contrib:0.147.0

  serviceAccount: kubernetes-collector

  resources:
    limits:
      memory: 256Mi
      cpu: 300m
    requests:
      memory: 128Mi
      cpu: 100m

  config:
    receivers:
      k8s_cluster:
        collection_interval: 30s
        node_conditions_to_report:
          - Ready
          - MemoryPressure
          - DiskPressure
          - PIDPressure
        allocatable_types_to_report:
          - cpu
          - memory
          - storage

      k8sobjects:
        objects:
          - name: events
            mode: watch
            group: ""
            namespaces: [all]

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 200
        spike_limit_mib: 50

      batch:
        timeout: 10s
        send_batch_size: 1000
        send_batch_max_size: 2000

      k8s_attributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.daemonset.name
            - k8s.statefulset.name
            - k8s.job.name
            - k8s.replicaset.name

      transform:
        metric_statements:
          - context: resource
            statements:
              # Node-level metrics — use raw node name
              - set(attributes["host.name"], attributes["k8s.node.name"])
                where attributes["k8s.node.name"] != nil
              # Pod/container-level — overrides node if pod name is present
              - set(attributes["host.name"], Concat(["pod_k3s_", attributes["k8s.namespace.name"], "_", attributes["k8s.pod.name"]], ""))
                where attributes["k8s.pod.name"] != nil and attributes["k8s.namespace.name"] != nil
              # Deployment-level
              - set(attributes["host.name"], Concat(["deployment_k3s_", attributes["k8s.namespace.name"], "_", attributes["k8s.deployment.name"]], ""))
                where attributes["k8s.deployment.name"] != nil and attributes["k8s.pod.name"] == nil
              # DaemonSet-level
              - set(attributes["host.name"], Concat(["daemonset_k3s_", attributes["k8s.namespace.name"], "_", attributes["k8s.daemonset.name"]], ""))
                where attributes["k8s.daemonset.name"] != nil and attributes["k8s.pod.name"] == nil
              # StatefulSet-level
              - set(attributes["host.name"], Concat(["statefulset_k3s_", attributes["k8s.namespace.name"], "_", attributes["k8s.statefulset.name"]], ""))
                where attributes["k8s.statefulset.name"] != nil and attributes["k8s.pod.name"] == nil
              # Job-level
              - set(attributes["host.name"], Concat(["job_k3s_", attributes["k8s.namespace.name"], "_", attributes["k8s.job.name"]], ""))
                where attributes["k8s.job.name"] != nil and attributes["k8s.pod.name"] == nil
              # ReplicaSet-level
              - set(attributes["host.name"], Concat(["replicaset_k3s_", attributes["k8s.namespace.name"], "_", attributes["k8s.replicaset.name"]], ""))
                where attributes["k8s.replicaset.name"] != nil and attributes["k8s.pod.name"] == nil

      resource:
        attributes:
          - key: service.name
            value: kubernetes-metrics
            action: insert
          - key: cluster.name
            value: k3s
            action: insert

    exporters:
      otlp_grpc:
        endpoint: "gateway-collector.otel-collectors.svc.cluster.local:4317"
        tls:
          insecure: true
        timeout: 30s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

    service:
      extensions: [health_check]
      telemetry:
        logs:
          level: warn
      pipelines:
        metrics:
          receivers: [k8s_cluster]
          processors: [memory_limiter, k8s_attributes, transform, resource, batch]
          exporters: [otlp_grpc]

        logs:
          receivers: [k8sobjects]
          processors: [memory_limiter, resource, batch]
          exporters: [otlp_grpc]

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-collector
  namespace: otel-collectors

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-collector
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - services
      - endpoints
      - namespaces
      - replicationcontrollers
      - resourcequotas
      - persistentvolumes
      - persistentvolumeclaims
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-collector
subjects:
  - kind: ServiceAccount
    name: kubernetes-collector
    namespace: otel-collectors
