apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: myapp-cert
  namespace: cert-manager
spec:
  secretName: myapp-cert-secret
  duration: 2160h      # 90 days
  renewBefore: 720h    # Renew 30 days before expiry
  issuerRef:
    name: wildcard-issuer    # Change to your issuer name
    kind: Issuer
  commonName: myapp.local
  dnsNames:
    - myapp.local
    - myapp.example.com
    - api.myapp.local
    - app.myapp.example.com
    - *.myapp.local           # Wildcard
  ipAddresses:
    - 192.168.1.100
    - 10.0.1.50
