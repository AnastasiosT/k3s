---
apiVersion: v1
kind: Namespace
metadata:
  name: postgres

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: postgres
type: Opaque
stringData:
  POSTGRES_PASSWORD: "postgres123"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: postgres
data:
  POSTGRES_DB: shop

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
  namespace: postgres
data:
  postgresql.conf: |
    # Optimized PostgreSQL configuration for k3s observability lab
    # Network settings
    listen_addresses = '*'

    # Load extensions for observability
    shared_preload_libraries = 'pg_stat_statements'

    # Connection and resource settings
    max_connections = 100
    shared_buffers = 128MB
    effective_cache_size = 256MB
    work_mem = 2MB
    maintenance_work_mem = 32MB

    # WAL (Write-Ahead Logging) optimization
    wal_buffers = 4MB
    synchronous_commit = off

    # Query execution
    random_page_cost = 1.1
    effective_io_concurrency = 200

    # Logging for observability
    log_min_duration_statement = 1000
    log_checkpoints = on
    log_connections = off
    log_disconnections = off
    log_lock_waits = on

    # Performance tuning
    jit = on
    jit_above_cost = 100000
    jit_inline_above_cost = 500000

  pg_hba.conf: |
    # PostgreSQL Client Authentication Configuration
    # TYPE  DATABASE        USER            ADDRESS                 METHOD
    local   all             all                                     trust
    host    all             all             127.0.0.1/32            md5
    host    all             all             ::1/128                 md5
    host    all             all             0.0.0.0/0               md5

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        envFrom:
        - configMapRef:
            name: postgres-config
        - secretRef:
            name: postgres-secret
        args:
        - "-c"
        - "config_file=/etc/postgresql/postgresql.conf"
        - "-c"
        - "hba_file=/etc/postgresql/pg_hba.conf"
        - "-c"
        - "shared_preload_libraries=pg_stat_statements"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        - name: postgres-config-vol
          mountPath: /etc/postgresql
          readOnly: true
        resources:
          requests:
            memory: "192Mi"
            cpu: "150m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 10
          failureThreshold: 3
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: postgres-config-vol
        configMap:
          name: postgres-init-config

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-lb
  namespace: postgres
spec:
  type: LoadBalancer
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init
  namespace: postgres
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: init
        image: postgres:16-alpine
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h postgres.postgres.svc -p 5432 -U postgres; do
            sleep 2
          done
          echo "PostgreSQL is ready, running initialization script..."
          psql -h postgres.postgres.svc -U postgres -f /scripts/init.sql
          echo "Initialization complete!"
        volumeMounts:
        - name: init-scripts
          mountPath: /scripts
      volumes:
      - name: init-scripts
        configMap:
          name: init-scripts

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-workload
  namespace: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-workload
  template:
    metadata:
      labels:
        app: postgres-workload
    spec:
      containers:
      - name: workload
        image: python:3.11-slim
        env:
        - name: PG_HOST
          value: postgres.postgres.svc
        - name: PG_PORT
          value: "5432"
        - name: PG_DB
          value: shop
        - name: PG_USER
          value: postgres
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        command:
        - /bin/bash
        - -c
        - |
          pip install -q psycopg2-binary && python /scripts/workload.py
        volumeMounts:
        - name: workload-scripts
          mountPath: /scripts
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: workload-scripts
        configMap:
          name: workload-scripts
